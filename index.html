<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PNG Meme Button</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111111;
      color: #ffffff;
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .title {
      font-size: 24px;
      margin-bottom: 12px;
    }

    .hint {
      font-size: 15px;
      line-height: 1.5;
      color: #d0d0d0;
      margin-bottom: 20px;
    }

    .image-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      overflow: visible;
    }

    .meme-button {
      display: block;
      width: auto;
      max-width: 100%;
      height: auto;
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
    }

    .status {
      margin-top: 16px;
      min-height: 24px;
      font-size: 14px;
      color: #a8f0c6;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="title">PNG-кнопка</div>
    <div class="hint">Мем отправится только при клике по непрозрачной области изображения.</div>

    <div class="image-wrap">
      <img id="memeButton" class="meme-button" src="./button.png" alt="Meme button" />
    </div>

    <div id="status" class="status">Ожидание загрузки PNG...</div>
  </main>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const memeButton = document.getElementById('memeButton');
    const status = document.getElementById('status');

    const hitCanvas = document.createElement('canvas');
    const hitCtx = hitCanvas.getContext('2d', { willReadFrequently: true });
    let maskReady = false;

    function buildHitMask(img) {
      hitCanvas.width = img.naturalWidth;
      hitCanvas.height = img.naturalHeight;
      hitCtx.clearRect(0, 0, hitCanvas.width, hitCanvas.height);
      hitCtx.drawImage(img, 0, 0);
      maskReady = true;
      status.textContent = 'PNG загружен. Нажми по непрозрачной части.';
    }

    function isOpaqueClick(event, img, alphaThreshold = 20) {
      if (!maskReady) return false;

      const rect = img.getBoundingClientRect();
      const localX = event.clientX - rect.left;
      const localY = event.clientY - rect.top;

      if (localX < 0 || localY < 0 || localX > rect.width || localY > rect.height) {
        return false;
      }

      const imageX = Math.floor(localX * (img.naturalWidth / rect.width));
      const imageY = Math.floor(localY * (img.naturalHeight / rect.height));
      const pixel = hitCtx.getImageData(imageX, imageY, 1, 1).data;
      const alpha = pixel[3];

      return alpha > alphaThreshold;
    }

    function sendOpaqueClick() {
      const payload = JSON.stringify({ action: 'opaque_click', ts: Date.now() });
      tg.sendData(payload);
      status.textContent = 'Сигнал отправлен боту. Возвращайся в чат.';
      setTimeout(() => tg.close(), 250);
    }

    if (memeButton.complete && memeButton.naturalWidth > 0) {
      buildHitMask(memeButton);
    } else {
      memeButton.addEventListener('load', () => buildHitMask(memeButton), { once: true });
    }

    memeButton.addEventListener('error', () => {
      status.textContent = 'Не удалось загрузить button.png';
    });

    memeButton.addEventListener('click', (event) => {
      if (!isOpaqueClick(event, memeButton)) {
        status.textContent = 'Клик был по прозрачной области';
        return;
      }

      sendOpaqueClick();
    });
  </script>
</body>
</html>
